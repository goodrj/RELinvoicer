<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relec Invoicer — Label Dimension Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>Relec Invoicer</h1>
        <p>Label dimension extractor</p>
      </div>
    </div>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf" />
    <div class="upload-icon">📄</div>
    <h2>Drop a PDF here, or click to browse</h2>
    <p>Engineering drawings with dimension annotations</p>
  </div>

  <div id="fileBar" style="display:none" class="file-bar">
    <span id="fileName" class="file-bar-name"></span>
    <span id="fileMeta" class="file-bar-meta"></span>
    <button class="btn btn-ghost" id="clearBtn" style="padding:5px 12px;font-size:12px">✕ Clear</button>
  </div>

  <!-- Thumbnails -->
  <div class="thumbnails-section" id="thumbnailsSection" style="display:none">
    <div class="section-header">
      <span class="section-title">Pages</span>
      <span id="pageCount" style="font-size:12px;color:var(--text-muted)"></span>
    </div>
    <div class="thumbnails-grid" id="thumbnailsGrid"></div>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls" style="display:none">
    <button class="btn btn-primary" id="analyzeBtn" disabled>
      <span id="analyzeBtnIcon">▶</span>
      <span id="analyzeBtnText">Analyze All Pages</span>
    </button>
    <span id="progressText" style="font-size:12px;color:var(--text-muted)"></span>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection" style="display:none">
    <div class="results-header">
      <span class="section-title">Extracted Dimensions</span>
      <div class="results-actions">
        <button class="btn btn-ghost" id="copyBtn">
          📋 Copy Numbers
        </button>
        <button class="btn btn-ghost" id="exportBtn">
          ⬇ Export .xlsx
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Status</th>
            <th>Qty</th>
            <th>Width X (mm)</th>
            <th>Height Y (mm)</th>
            <th>Pages</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div class="total-bar" id="totalBar">
      <span class="total-bar-label">Confirmed quantity total</span>
      <span class="total-bar-value" id="totalValue">0</span>
    </div>
  </div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="app.js"></script>
</body>
</html>
